<!DOCTYPE html>

    <link rel="stylesheet" href="stylestyle.css">
</head>

<body>
    <header>
        <div class="header-container">
            <span class="logo">Café Amora</span>

    <section class="hero">

                <button class="btn-primary">Ver cardápio</button>
