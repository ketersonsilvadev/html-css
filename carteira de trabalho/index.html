<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RG Digital</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="container">
            <h1>
                LOGIN
            </h1>

            <form>
                <div class="login">
                    <label for="email">email</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" maxlength="100" required>
                </div>

                <div class="login">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" minlength="8" maxlength="10" required>
                </div>

                <div class="esqueceu-a-senha">
                    Esqueceu sua senha? <a href="#">Recupere aqui</a>
                </div>

                <button>
                    Entrar
                </button>
            </form>
        </div>
    </main>
</body>

</html>
