<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caféteria</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-container">
            <span class="logo">Café Amora</span>
            <nav class="nav-bar">
                <a href="#">Cardápio</a>
                <a href="#">Sobre</a>
                <a href="#">Contato</a>
            </nav>
            <button class="btn-primary">Peça agora</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-box">
            <p class="eyebtow">Torrado na hora</p>
            <h1>Um café que aquece o dia</h1>
            <p class="sub-title">Grão selecionados , torra artesanal e aquele cherinho <br>que só o Café Aroma tem.</p>
            <div class="hero-buttons">
                <button class="btn-primary">Ver cardápio</button>
                <button class="btn-secondary">Nossa história</button>
            </div>
        </div>
    </section>
    
</body>

</html>
